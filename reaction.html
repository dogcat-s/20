<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reaction Time - Gun Edition</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid #fff;
            color: #fff;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            z-index: 1000;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .container {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 1200px;
        }

        .game-area {
            position: relative;
            width: 600px;
            height: 500px;
            background: linear-gradient(to bottom, #1a1a2e, #16213e);
            border: 4px solid #fff;
            border-radius: 10px;
            cursor: crosshair;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .game-area.ready {
            background: linear-gradient(135deg, #51cf66, #40c057);
        }

        .reaction-target {
            position: absolute;
            width: 60px;
            height: 60px;
            background: radial-gradient(circle at 30% 30%, #ffff00, #ff8800);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            box-shadow: 0 0 20px rgba(255, 136, 0, 0.8);
            animation: pulse 0.5s ease-out;
        }

        @keyframes pulse {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .stats-panel {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            width: 280px;
            height: fit-content;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid #eee;
            font-size: 16px;
        }

        .stat-item:last-child {
            border-bottom: none;
        }

        .stat-label {
            color: #666;
            font-weight: 600;
        }

        .stat-value {
            color: #667eea;
            font-size: 24px;
            font-weight: bold;
        }

        .timer {
            font-size: 36px;
            font-weight: bold;
            color: #667eea;
            text-align: center;
            margin: 20px 0;
            min-height: 50px;
        }

        .buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .start-btn {
            background: #51cf66;
            color: #fff;
        }

        .start-btn:hover {
            background: #40c057;
            transform: translateY(-2px);
        }

        .reset-btn {
            background: #ff922b;
            color: #fff;
        }

        .reset-btn:hover {
            background: #fd7e14;
            transform: translateY(-2px);
        }

        @media (max-width: 900px) {
            .container {
                flex-direction: column;
                align-items: center;
            }

            .game-area {
                width: 100%;
                max-width: 500px;
                height: 400px;
            }

            .stats-panel {
                width: 100%;
                max-width: 500px;
            }
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-btn">← Back to Menu</a>

    <div class="container">
        <div class="game-area" id="gameArea">
            <div class="timer" id="timer">Click to Start</div>
        </div>

        <div class="stats-panel">
            <div class="stat-item">
                <span class="stat-label">Current Time:</span>
                <span class="stat-value" id="currentTime">-</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Best:</span>
                <span class="stat-value" id="bestValue">-</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Average:</span>
                <span class="stat-value" id="avgValue">-</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Tests:</span>
                <span class="stat-value" id="testCount">0</span>
            </div>

            <div class="buttons">
                <button class="btn start-btn" id="startBtn">Start Test</button>
                <button class="btn reset-btn" id="resetBtn">Reset All</button>
            </div>
        </div>
    </div>

    <script>
        const gameArea = document.getElementById('gameArea');
        let reactionTimes = [];
        let testActive = false;
        let startTime = 0;

        document.getElementById('startBtn').addEventListener('click', startReactionTest);
        document.getElementById('resetBtn').addEventListener('click', resetStats);

        function startReactionTest() {
            gameArea.classList.remove('ready');
            document.getElementById('timer').textContent = 'Wait...';
            testActive = false;

            // Remove previous target if exists
            const oldTarget = gameArea.querySelector('.reaction-target');
            if (oldTarget) oldTarget.remove();

            const delay = Math.random() * 3000 + 1000;
            setTimeout(() => {
                gameArea.classList.add('ready');
                
                // Create target
                const target = document.createElement('div');
                target.className = 'reaction-target';
                target.textContent = '🎯';
                gameArea.appendChild(target);

                document.getElementById('timer').textContent = 'SHOOT NOW!';
                startTime = Date.now();
                testActive = true;
            }, delay);
        }

        gameArea.addEventListener('click', (e) => {
            if (testActive) {
                const reactionTime = Date.now() - startTime;
                reactionTimes.push(reactionTime);
                testActive = false;

                gameArea.classList.remove('ready');
                const target = gameArea.querySelector('.reaction-target');
                if (target) target.remove();

                document.getElementById('timer').textContent = reactionTime + 'ms';
                document.getElementById('currentTime').textContent = reactionTime + 'ms';

                const best = Math.min(...reactionTimes);
                const avg = Math.round(reactionTimes.reduce((a, b) => a + b) / reactionTimes.length);
                document.getElementById('bestValue').textContent = best + 'ms';
                document.getElementById('avgValue').textContent = avg + 'ms';
                document.getElementById('testCount').textContent = reactionTimes.length;
            }
        });

        function resetStats() {
            reactionTimes = [];
            testActive = false;
            gameArea.classList.remove('ready');
            const target = gameArea.querySelector('.reaction-target');
            if (target) target.remove();
            
            document.getElementById('timer').textContent = 'Click to Start';
            document.getElementById('currentTime').textContent = '-';
            document.getElementById('bestValue').textContent = '-';
            document.getElementById('avgValue').textContent = '-';
            document.getElementById('testCount').textContent = '0';
        }
    </script>
</body>
</html>
